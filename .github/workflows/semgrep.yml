name: Semgrep

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  semgrep:
    permissions:
      contents: read
      security-events: write
      actions: read
    name: semgrep/ci
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:1.166.0
    if: (github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v4
      # Run scan but don't block CI on findings — until Code Scanning is
      # enabled on the repo we can't triage findings interactively, and the
      # SARIF artifact below preserves them for offline review.
      - run: semgrep ci --sarif --output=semgrep.sarif || true
        env:
          SEMGREP_RULES: p/default
      - name: Upload SARIF as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          if-no-files-found: warn
        if: always()
      - name: Upload SARIF file for GitHub Advanced Security Dashboard
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        # Upload only if Code Scanning is enabled on the repo. Without it
        # the upload returns 403 "Code Security must be enabled" — that
        # shouldn't fail the scan itself.
        if: always()
        continue-on-error: true
