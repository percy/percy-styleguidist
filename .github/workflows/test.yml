name: Test
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      branch:
        description: Which branch of @percy/cli to build from source for this run
        required: false
        default: master
jobs:
  test:
    name: Test (node ${{ matrix.node }}${{ matrix.rsg-label && format(', rsg {0}', matrix.rsg-label) || '' }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: [18, 20, 22]
        # Default jobs (3) test against the RSG version pinned in devDependencies (currently ^13).
        # The `include` block adds advisory jobs that test additional peer-dep major versions.
        # `continue-on-error: true` is set per-job below so RSG-12 breakage surfaces as a
        # warning rather than a failure — narrow `peerDependencies.react-styleguidist` if
        # those jobs go consistently red.
        include:
          - os: ubuntu-latest
            node: 22
            rsg: '^12.0.0'
            rsg-label: '12'
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.rsg != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}/node-${{ matrix.node }}/rsg-${{ matrix.rsg-label || 'default' }}/${{ hashFiles('**/package.json') }}
          restore-keys: ${{ runner.os }}/node-${{ matrix.node }}/rsg-${{ matrix.rsg-label || 'default' }}/
      - run: npm install
        env:
          PERCY_POSTINSTALL_BROWSER: true
      - name: Override react-styleguidist to ${{ matrix.rsg }}
        if: matrix.rsg != ''
        run: npm install --no-save react-styleguidist@${{ matrix.rsg }}
      - run: npm run build
      # Download Chromium before tests — tests run in a mock environment
      # that intercepts HTTP requests, so Chromium must be pre-installed
      - name: Ensure Chromium is installed
        run: node -e "import('./node_modules/@percy/core/dist/install.js').then(m => m.chromium()).then(p => console.log('Chromium:', p))"
      - name: Build test fixtures (explicit; .npmrc ignore-scripts skips the pretest hook)
        run: npm run pretest

      # Optionally run the suite against an unpublished @percy/cli branch
      # (workflow_dispatch only): build the CLI from source and link it so the
      # mock-loader tests exercise that branch's @percy/* packages. The branch
      # is regex-validated and passed via env (never interpolated into a shell).
      - uses: actions-ecosystem/action-regex-match@v2
        id: regex-match
        if: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          text: ${{ github.event.inputs.branch }}
          regex: '^[a-zA-Z0-9_/\-]+$'
      - name: Break on invalid branch name
        if: ${{ github.event_name == 'workflow_dispatch' && steps.regex-match.outputs && steps.regex-match.outputs.match == '' }}
        run: exit 1
      - name: Set up @percy/cli from git
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          BRANCH: ${{ github.event.inputs.branch }}
          WORKSPACE: ${{ github.workspace }}
        run: |
          cd /tmp
          git clone --branch "$BRANCH" --depth 1 https://github.com/percy/cli
          cd cli
          npm install
          npm run build
          npm link
          cd "$WORKSPACE"
          npm link @percy/cli
          npx percy --version

      - run: npm run test:coverage
